<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="/" class="text-lg font-bold tracking-tight text-gray-900">Narad</a>
                <nav class="flex gap-1">
                    <a href="/" class="px-3 py-1.5 rounded-md text-sm transition-colors
                        {% if active_tab == 'briefing' %}bg-gray-100 text-gray-900 font-medium{% else %}text-gray-500 hover:text-gray-700 hover:bg-gray-50{% endif %}">
                        Briefing
                    </a>
                    <a href="/explore" class="px-3 py-1.5 rounded-md text-sm transition-colors
                        {% if active_tab == 'explore' %}bg-gray-100 text-gray-900 font-medium{% else %}text-gray-500 hover:text-gray-700 hover:bg-gray-50{% endif %}">
                        Explore
                    </a>
                    <a href="/feed" class="px-3 py-1.5 rounded-md text-sm transition-colors
                        {% if active_tab == 'feed' %}bg-gray-100 text-gray-900 font-medium{% else %}text-gray-500 hover:text-gray-700 hover:bg-gray-50{% endif %}">
                        Feed
                    </a>
                </nav>
            </div>
            <a href="/admin/status" class="text-[11px] text-gray-300 hover:text-gray-500 transition-colors">Status</a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>

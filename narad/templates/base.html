<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>NARAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'SF Mono', 'Menlo', 'monospace'],
                    },
                    colors: {
                        surface: { 1: '#0a0a0f', 2: '#12121a', 3: '#1a1a25', 4: '#22222f' },
                        accent: { red: '#ef4444', amber: '#f59e0b', green: '#22c55e', blue: '#3b82f6', purple: '#a855f7' },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0f; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .glow-red { box-shadow: 0 0 12px rgba(239,68,68,0.15); }
        .glow-amber { box-shadow: 0 0 12px rgba(245,158,11,0.12); }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @media (max-width: 640px) { a, button { min-height: 44px; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="text-gray-300 min-h-screen font-sans">
    <header class="bg-surface-2/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-11 sm:h-12 flex items-center justify-between">
            <div class="flex items-center gap-4 sm:gap-6 min-w-0">
                <a href="/" class="font-mono text-xs sm:text-sm font-medium tracking-widest text-white/80 flex-shrink-0">NARAD</a>
                <nav class="flex gap-0.5">
                    <a href="/" class="px-2 sm:px-2.5 py-1 rounded text-[11px] sm:text-xs font-mono tracking-wide transition-colors flex items-center {% if active_tab == 'briefing' %}bg-white/10 text-white{% else %}text-white/40 hover:text-white/70{% endif %}">
                        COMMAND
                    </a>
                    <a href="/trading" class="px-2 sm:px-2.5 py-1 rounded text-[11px] sm:text-xs font-mono tracking-wide transition-colors flex items-center {% if active_tab == 'trading' %}bg-white/10 text-white{% else %}text-white/40 hover:text-white/70{% endif %}">
                        TRADING
                    </a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <span id="live-badge" class="hidden sm:flex items-center gap-1.5 text-[10px] font-mono text-white/30 cursor-default" title="Data updating in real-time">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 pulse-dot"></span>
                    LIVE
                </span>
                <a href="/admin/status" class="text-[10px] font-mono text-white/20 hover:text-white/40 transition-colors hidden sm:block">SYS</a>
            </div>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-4 sm:py-5">
        {% block content %}{% endblock %}
    </main>
</body>
</html>

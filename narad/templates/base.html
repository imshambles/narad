<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>Narad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        /* Hide scrollbar on filter rows */
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        /* Safe areas for notched phones */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-x { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
        /* Touch targets */
        @media (max-width: 640px) {
            a, button { min-height: 44px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans safe-top">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 safe-x">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 h-12 sm:h-14 flex items-center justify-between">
            <div class="flex items-center gap-4 sm:gap-8 min-w-0">
                <a href="/" class="text-base sm:text-lg font-bold tracking-tight text-gray-900 flex-shrink-0">Narad</a>
                <nav class="flex gap-0.5 sm:gap-1">
                    <a href="/" class="px-2.5 sm:px-3 py-1.5 rounded-md text-xs sm:text-sm transition-colors flex items-center
                        {% if active_tab == 'briefing' %}bg-gray-100 text-gray-900 font-medium{% else %}text-gray-500 active:bg-gray-100{% endif %}">
                        Briefing
                    </a>
                    <a href="/explore" class="px-2.5 sm:px-3 py-1.5 rounded-md text-xs sm:text-sm transition-colors flex items-center
                        {% if active_tab == 'explore' %}bg-gray-100 text-gray-900 font-medium{% else %}text-gray-500 active:bg-gray-100{% endif %}">
                        Explore
                    </a>
                    <a href="/feed" class="px-2.5 sm:px-3 py-1.5 rounded-md text-xs sm:text-sm transition-colors flex items-center
                        {% if active_tab == 'feed' %}bg-gray-100 text-gray-900 font-medium{% else %}text-gray-500 active:bg-gray-100{% endif %}">
                        Feed
                    </a>
                </nav>
            </div>
            <a href="/admin/status" class="text-[11px] text-gray-300 hover:text-gray-500 transition-colors flex-shrink-0 hidden sm:block">Status</a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-4 sm:py-6 safe-x">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
